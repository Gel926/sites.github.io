<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Nick Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
  <h1>Nick Generator</h1>

  <input id="input" placeholder="dark wolf fire">

  <label>
    <input type="checkbox" id="shortOnly">
    only short nicks
  </label>

  <button onclick="generate()">Generate</button>

  <div class="result" id="result" onclick="copyNick()"></div>
  <div class="small">click to copy</div>
</div>

<script src="script.js"></script>

</body>
</html>
